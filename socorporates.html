  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\">Get in touch<\u002Fa>\n        <\u002Fnav>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n        <a href=\"#contact\" style=\"justify-self:end; padding:10px 18px; background:{{ ink }}; color:{{ bg }}; border-radius:999px; font-size:13px; letter-spacing:0.3px; font-weight:500;\">Contact<\u002Fa>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <nav sc-camel-on-click=\"{{ closeMenu }}\" style=\"display:flex; flex-direction:column; padding:8px 6vw 22px; gap:4px; border-top:1px solid {{ hairline }}; background:{{ bg }};\">\n        <a href=\"#services\" style=\"padding:14px 4px; font-size:16px; border-bottom:1px solid {{ hairline }};\">Services<\u002Fa>\n        <a href=\"#work\" style=\"padding:14px 4px; font-size:16px; border-bottom:1px solid {{ hairline }};\">Featured Work<\u002Fa>\n        <a href=\"#about\" style=\"padding:14px 4px; font-size:16px; border-bottom:1px solid {{ hairline }};\">About<\u002Fa>\n        <a href=\"#contact\" style=\"padding:14px 4px; font-size:16px; color:{{ accentGoldDeep }}; font-weight:500;\">Get in touch<\u002Fa>\n      <\u002Fnav>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Hero\" style=\"padding:14vh 6vw 12vh; display:flex; flex-direction:column; gap:28px; border-bottom:1px solid {{ hairline }};\">\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; letter-spacing:2px; text-transform:uppercase; color:{{ accentGoldDeep }}; animation:fadeUp 0.6s ease both;\">\n      <span style=\"width:28px; height:1px; background:{{ accentGoldDeep }};\"><\u002Fspan>\n      Marrakesh, Morocco\n    <\u002Fdiv>\n    <h1 style=\"font-family:{{ headingFontFamily }}; font-weight:600; font-size:clamp(44px,7vw,84px); line-height:1.08; letter-spacing:-0.3px; margin:0; max-width:20ch;\">\n      <sc-for list=\"{{ heroWords }}\" as=\"w\" hint-placeholder-count=\"8\">\n        <span class=\"kinetic-word\" style=\"animation-delay:{{ w.delay }};\">{{ w.text }}&nbsp;<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fh1>\n    <p style=\"font-size:19px; line-height:1.65; color:{{ inkSoft }}; max-width:46ch; margin:0; animation:fadeUp 0.7s ease 0.4s both;\">\n      So Corporates is a Marrakesh-based agency delivering public relations, videography, and destination management for brands and institutions across Morocco and beyond.\n    <\u002Fp>\n    <div style=\"display:flex; gap:16px; margin-top:12px;\">\n      <a href=\"#contact\" style=\"background:{{ ink }}; color:{{ bg }}; padding:15px 30px; font-size:14px; letter-spacing:0.3px; border-radius:2px;\">Start a project<\u002Fa>\n      <a href=\"#work\" style=\"border:1px solid {{ hairline }}; padding:15px 30px; font-size:14px; letter-spacing:0.3px; border-radius:2px; color:{{ ink }};\">See our work<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SERVICES -->\n  <section id=\"services\" data-screen-label=\"Services\" style=\"padding:12vh 6vw; border-bottom:1px solid {{ hairline }};\">\n    <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:64px; gap:24px; flex-wrap:wrap;\">\n      <h2 class=\"reveal-on-scroll\" style=\"font-family:{{ headingFontFamily }}; font-weight:600; font-size:clamp(30px,4vw,44px); margin:0;\">What we do<\u002Fh2>\n      <span style=\"font-size:14px; color:{{ inkFaint }}; letter-spacing:0.5px;\">01 — 03<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:0; border-top:1px solid {{ hairline }};\">\n      <sc-for list=\"{{ serviceList }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <div class=\"reveal-on-scroll\" style=\"padding:40px 32px 0 0; border-right:1px solid {{ hairline }}; display:flex; flex-direction:column; gap:18px; min-height:340px;\">\n          <div style=\"font-size:14px; letter-spacing:1px; color:{{ accentGoldDeep }};\">{{ s.num }}<\u002Fdiv>\n          <h3 style=\"font-family:{{ headingFontFamily }}; font-weight:600; font-size:27px; margin:0; line-height:1.25;\">{{ s.title }}<\u002Fh3>\n          <p style=\"font-size:16px; line-height:1.65; color:{{ inkSoft }}; margin:0; padding-right:12px;\">{{ s.desc }}<\u002Fp>\n          <div style=\"margin-top:auto; display:flex; flex-direction:column; gap:8px; padding-top:18px; padding-bottom:40px;\">\n            <sc-for list=\"{{ s.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n              <div style=\"font-size:14px; color:{{ inkFaint }}; display:flex; align-items:center; gap:8px;\">\n                <span style=\"width:4px; height:4px; border-radius:50%; background:{{ accentGoldDeep }}; flex:none;\"><\u002Fspan>{{ it }}\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURED WORK -->\n  <section id=\"work\" data-screen-label=\"Featured Work\" style=\"padding:12vh 6vw; background:{{ inkPanel }}; color:{{ bg }}; border-bottom:1px solid {{ hairline }};\">\n    <h2 class=\"reveal-on-scroll\" style=\"font-family:{{ headingFontFamily }}; font-weight:600; font-size:clamp(30px,4vw,44px); margin:0 0 12px;\">Featured work<\u002Fh2>\n    <p style=\"font-size:16px; color:{{ bgSoft }}; max-width:52ch; margin:0 0 48px; line-height:1.6;\">\n      Selected engagements led by our founding team, spanning large-scale sporting events and international broadcast documentary.\n    <\u002Fp>\n\n    <div class=\"reveal-on-scroll\" style=\"display:flex; align-items:center; gap:24px; padding:24px 28px; background:{{ inkPanelLine }}44; border:1px solid {{ inkPanelLine }}; border-radius:3px; margin-bottom:48px; flex-wrap:wrap;\">\n      <img src=\"https://lemondefeminin.com/wp-content/uploads/2024/12/Shama-OUTABIHT-500x470.webp\" alt=\"Shama Outabiht, CEO\" style=\"width:76px; height:76px; border-radius:50%; object-fit:cover; flex:none; border:2px solid {{ accentGold }};\">\n      <div>\n        <div style=\"font-family:{{ headingFontFamily }}; font-size:19px; font-weight:600;\">Shama Outabiht<\u002Fdiv>\n        <div style=\"font-size:14px; color:{{ bgSoft }}; margin-top:4px;\">Founder &amp; CEO — organizer of the Marrakesh International Marathon and contributor to an Abu Dhabi TV documentary on Morocco<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:64px;\">\n      <div class=\"reveal-on-scroll\" style=\"display:flex; flex-direction:column; gap:20px; border-top:1px solid {{ inkPanelLine }}; padding-top:28px;\">\n        <div style=\"font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:{{ accentGold }};\">Destination &amp; Event Management<\u002Fdiv>\n        <h3 style=\"font-family:{{ headingFontFamily }}; font-size:29px; font-weight:600; margin:0;\">Marrakesh International Marathon<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.7; color:{{ bgSoft }}; margin:0; max-width:44ch;\">\n          Our CEO contributed directly to the organization of the Marrakesh International Marathon, one of Morocco's largest annual sporting events — coordinating logistics, stakeholders, and on-the-ground operations at city scale.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal-on-scroll\" style=\"display:flex; flex-direction:column; gap:20px; border-top:1px solid {{ inkPanelLine }}; padding-top:28px;\">\n        <div style=\"font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:{{ accentGold }};\">Videography &amp; Editing<\u002Fdiv>\n        <h3 style=\"font-family:{{ headingFontFamily }}; font-size:29px; font-weight:600; margin:0;\">Abu Dhabi TV Documentary on Morocco<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.7; color:{{ bgSoft }}; margin:0; max-width:44ch;\">\n          Our CEO contributed to a documentary produced by an Abu Dhabi television channel exploring Morocco — bringing local production expertise to an international broadcast audience.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT / TRUST -->\n  <section id=\"about\" data-screen-label=\"About\" style=\"padding:12vh 6vw; border-bottom:1px solid {{ hairline }};\">\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:80px; align-items:start;\">\n      <div class=\"reveal-on-scroll\">\n        <h2 style=\"font-family:{{ headingFontFamily }}; font-weight:600; font-size:clamp(30px,4vw,44px); margin:0 0 24px;\">Rooted in Marrakesh, built for scale<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:{{ inkSoft }}; margin:0 0 20px; max-width:48ch;\">\n          So Corporates was founded to give institutions, brands, and organizers a single trusted partner across communications, production, and on-the-ground event delivery in Morocco.\n        <\u002Fp>\n        <p style=\"font-size:16px; line-height:1.75; color:{{ inkSoft }}; margin:0; max-width:48ch;\">\n          We combine editorial-grade storytelling with operational discipline — the same rigor behind a national marathon and an international broadcast documentary.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal-on-scroll\" style=\"display:flex; flex-direction:column; gap:0; border-top:1px solid {{ hairline }};\">\n        <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:22px 0; border-bottom:1px solid {{ hairline }}; gap:24px;\">\n            <span style=\"font-family:{{ headingFontFamily }}; font-size:19px; font-weight:600;\">{{ p.label }}<\u002Fspan>\n            <span style=\"font-size:14px; color:{{ inkFaint }}; text-align:right; max-width:26ch;\">{{ p.value }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" data-screen-label=\"Contact\" style=\"padding:14vh 6vw; display:flex; flex-direction:column; gap:32px; align-items:flex-start;\">\n    <h2 class=\"reveal-on-scroll\" style=\"font-family:{{ headingFontFamily }}; font-weight:600; font-size:clamp(34px,5vw,56px); margin:0; max-width:18ch; line-height:1.1;\">\n      Let's discuss your next project.\n    <\u002Fh2>\n    <div class=\"contact-grid\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:0; width:100%; border-top:1px solid {{ hairline }};\">\n      <sc-for list=\"{{ contactMethods }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <a href=\"{{ c.href }}\" target=\"{{ c.target }}\" rel=\"noopener\" class=\"contact-card\" style=\"display:flex; flex-direction:column; gap:14px; padding:28px 8px 24px; border-right:1px solid {{ hairline }}; border-bottom:2px solid transparent; transition:border-bottom-color 0.3s;\" style-hover=\"border-bottom-color:{{ accentGold }};\">\n          <div style=\"font-size:13px; letter-spacing:1.5px; color:{{ accentGoldDeep }};\">{{ c.num }}<\u002Fdiv>\n          <div style=\"font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:{{ inkFaint }};\">{{ c.label }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:10px;\">\n            <span style=\"font-family:{{ headingFontFamily }}; font-size:20px;\">{{ c.value }}<\u002Fspan>\n            <span class=\"contact-arrow\" style=\"font-size:16px; color:{{ accentGoldDeep }}; transition:transform 0.25s;\">→<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:center; flex-wrap:wrap; margin-top:8px;\">\n      <div>Public Relations<\u002Fdiv>\n      <div>Videography &amp; Editing<\u002Fdiv>\n      <div>Destination &amp; Event Management<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"padding:28px 6vw; border-top:1px solid {{ hairline }}; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:{{ inkFaint }};\">\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <img src=\"5f4dc541-9eb4-4eb8-a271-e8e036b4bf58\" alt=\"\" style=\"width:20px; height:20px; opacity:0.7;\">\n      © 2026 So Corporates\n    <\u002Fdiv>\n    <div>Marrakesh, Morocco<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;headingFont&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Cormorant Garamond&quot;,&quot;options&quot;:[&quot;Playfair Display&quot;,&quot;Cormorant Garamond&quot;,&quot;Libre Caslon Display&quot;,&quot;Lora&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Typography&quot;}}\">\nclass Component extends DCLogic {\n  state = { isMobile: false, menuOpen: false };\n\n  componentDidMount() {\n    this.mq = window.matchMedia('(max-width: 860px)');\n    this.setState({ isMobile: this.mq.matches });\n    this.mqHandler = (e) => this.setState({ isMobile: e.matches, menuOpen: false });\n    this.mq.addEventListener('change', this.mqHandler);\n    this.initGsap();\n  }\n\n  initGsap(retries) {\n    retries = retries || 0;\n    if (!window.gsap || !window.ScrollTrigger) {\n      if (retries < 20) setTimeout(() => this.initGsap(retries + 1), 150);\n      return;\n    }\n    const gsap = window.gsap;\n    gsap.registerPlugin(window.ScrollTrigger);\n\n    gsap.set('.kinetic-word', { opacity: 0, y: 16, filter: 'blur(6px)' });\n    gsap.to('.kinetic-word', {\n      opacity: 1, y: 0, filter: 'blur(0px)',\n      duration: 0.8, stagger: 0.06, ease: 'power3.out', delay: 0.15\n    });\n\n    gsap.utils.toArray('.reveal-on-scroll').forEach((el) => {\n      gsap.from(el, {\n        opacity: 0, y: 40, duration: 1, ease: 'power3.out',\n        scrollTrigger: { trigger: el, start: 'top 85%' }\n      });\n    });\n\n    const headerInner = document.querySelector('[data-header-inner]');\n    const header = document.querySelector('[data-header]');\n    if (headerInner && header) {\n      window.ScrollTrigger.create({\n        start: 'top -60',\n        onEnter: () => { gsap.to(headerInner, { paddingTop: 10, paddingBottom: 10, duration: 0.3 }); gsap.to(header, { boxShadow: '0 10px 30px rgba(30,22,10,0.08)', duration: 0.3 }); },\n        onLeaveBack: () => { gsap.to(headerInner, { paddingTop: 16, paddingBottom: 16, duration: 0.3 }); gsap.to(header, { boxShadow: '0 1px 0 ' + 'oklch(0.92 0.04 85)', duration: 0.3 }); }\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    if (this.mq) this.mq.removeEventListener('change', this.mqHandler);\n  }\n\n  renderVals() {\n    const headingFont = this.props.headingFont ?? 'Playfair Display';\n    const heroText = \"Communications, film, and events — built on trust.\";\n    const heroWords = heroText.split(' ').map((text, i) => ({ text, delay: (i * 0.05) + 's' }));\n    return {\n      isMobile: this.state.isMobile,\n      isDesktop: !this.state.isMobile,\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      contactMethods: [\n        { num: '01', label: 'Email', value: 'shamaoutabiht@gmail.com', href: 'mailto:shamaoutabiht@gmail.com', target: '_self' },\n        { num: '02', label: 'WhatsApp', value: '+212 650 365 333', href: 'https://api.whatsapp.com/send?phone=212650365333', target: '_blank' },\n        { num: '03', label: 'Instagram', value: '@socorporates', href: 'https://www.instagram.com/socorporates', target: '_blank' }\n      ],\n      heroWords,\n      headingFontFamily: \"'\" + headingFont + \"', serif\",\n      bg: 'oklch(0.98 0.006 60)',\n      bgSoft: 'oklch(0.85 0.01 60)',\n      ink: 'oklch(0.22 0.012 60)',\n      inkSoft: 'oklch(0.42 0.012 60)',\n      inkFaint: 'oklch(0.6 0.01 60)',\n      hairline: 'oklch(0.88 0.008 60)',\n      inkPanel: 'oklch(0.18 0.014 50)',\n      inkPanelLine: 'oklch(0.3 0.014 50)',\n      accentGold: 'oklch(0.74 0.11 85)',\n      accentGoldDeep: 'oklch(0.6 0.11 78)',\n      accentGoldLight: 'oklch(0.92 0.04 85)',\n      serviceList: [\n        {\n          num: '01',\n          title: 'Public Relations',\n          desc: 'Strategic communications, media relations, and reputation management for brands and institutions operating in Morocco and the region.',\n          items: ['Media relations', 'Crisis & reputation', 'Brand positioning']\n        },\n        {\n          num: '02',\n          title: 'Videography & Editing',\n          desc: 'Broadcast-grade filming and editing, from documentary to corporate and campaign content, delivered for local and international audiences.',\n          items: ['Documentary production', 'Corporate & campaign film', 'Post-production & editing']\n        },\n        {\n          num: '03',\n          title: 'Destination & Event Management',\n          desc: 'End-to-end planning and on-the-ground delivery for large-scale events, from sporting fixtures to institutional gatherings.',\n          items: ['Event logistics & operations', 'Stakeholder coordination', 'Destination management']\n        }\n      ],\n      pillars: [\n        { label: 'Based in', value: 'Marrakesh, Morocco' },\n        { label: 'Marathon', value: 'Marrakesh International Marathon' },\n        { label: 'Broadcast', value: 'Abu Dhabi TV documentary on Morocco' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
